name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Linux: host-target tests (fast, cheap) ──────────────────────────────
  test-linux:
    name: Rust tests (host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Checkout ankitects/anki (rslib)
        uses: actions/checkout@v4
        with:
          repository: ankitects/anki
          ref: main
          path: anki
          submodules: false

      - name: Init FTL submodules (required by anki_i18n build script)
        working-directory: anki
        run: git submodule update --init --depth 1 ftl/core-repo ftl/qt-repo

      - name: Symlink anki as sibling (matches bridge/Cargo.toml path = "../../anki/rslib")
        run: ln -s "$GITHUB_WORKSPACE/anki" "$GITHUB_WORKSPACE/../anki"

      - name: Install system deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y protobuf-compiler ninja-build

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-cargo-

      - name: Rust stable
        run: rustup update stable && rustup default stable

      - name: cargo test
        run: cargo test --workspace

  # ── macOS: xcframework + Xcode build + simulator tests ─────────────────
  build-ios:
    name: iOS build (macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Checkout ankitects/anki (rslib)
        uses: actions/checkout@v4
        with:
          repository: ankitects/anki
          ref: main
          path: anki
          submodules: false

      - name: Init FTL submodules (required by anki_i18n build script)
        working-directory: anki
        run: git submodule update --init --depth 1 ftl/core-repo ftl/qt-repo

      - name: Symlink anki as sibling (matches bridge/Cargo.toml path = "../../anki/rslib")
        run: ln -s "$GITHUB_WORKSPACE/anki" "$GITHUB_WORKSPACE/../anki"

      - name: Install system deps
        run: |
          brew install protobuf ninja

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-cargo-

      - name: Rust stable + iOS targets
        run: |
          rustup update stable
          rustup default stable
          rustup target add aarch64-apple-ios aarch64-apple-ios-sim

      - name: Install swift-protobuf (protoc-gen-swift)
        run: brew install swift-protobuf

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Build xcframework
        run: bash scripts/build-rust.sh

      - name: Generate Swift protos
        run: bash scripts/gen-swift-proto.sh

      - name: Build web assets
        run: bash scripts/build-web-assets.sh
        continue-on-error: true   # Phase 3: requires full Node/npm toolchain from the desktop repo

      - name: Generate Xcode project
        working-directory: AnkiIOS
        run: xcodegen generate

      - name: Build for simulator
        run: |
          xcodebuild \
            -project AnkiIOS/AnkiIOS.xcodeproj \
            -scheme AnkiIOS \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            build \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || true

      - name: Run XCTests in simulator
        run: |
          xcodebuild test \
            -project AnkiIOS/AnkiIOS.xcodeproj \
            -scheme AnkiIOS \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty
        continue-on-error: true   # tests require Phase 2 Swift protos; remove once complete

      - name: Build IPA for device (unsigned, for Sideloadly)
        run: |
          xcodebuild archive \
            -project AnkiIOS/AnkiIOS.xcodeproj \
            -scheme AnkiIOS \
            -sdk iphoneos \
            -archivePath "$RUNNER_TEMP/AnkiIOS.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            | xcpretty || true
          # Package .app into a standard .ipa (zip with Payload/ folder)
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -r "$RUNNER_TEMP/AnkiIOS.xcarchive/Products/Applications/AnkiIOS.app" \
                "$RUNNER_TEMP/Payload/"
          cd "$RUNNER_TEMP"
          zip -qr AnkiIOS.ipa Payload/

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: AnkiIOS.ipa
          path: ${{ runner.temp }}/AnkiIOS.ipa
          if-no-files-found: warn
          retention-days: 14

      - name: Upload xcframework as artifact
        uses: actions/upload-artifact@v4
        with:
          name: AnkiBridge.xcframework
          path: out/AnkiBridge.xcframework
          if-no-files-found: warn
          retention-days: 14
