# xcodegen spec — run `xcodegen generate` in this directory on macOS.
# Do not commit the generated .xcodeproj.
name: AnkiIOS
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
packages:
  SwiftProtobuf:
    url: https://github.com/apple/swift-protobuf
    from: 1.28.0
targets:
  AnkiIOS:
    type: application
    platform: iOS
    sources:
      - Sources
    resources:
      - path: Resources/web
        optional: true
    dependencies:
      - package: SwiftProtobuf
      - framework: ../out/AnkiBridge.xcframework
        embed: false
    settings:
      base:
        SWIFT_OBJC_BRIDGING_HEADER: ../bridge/include/anki_bridge.h
        # Rust staticlibs need these system libs on iOS
        OTHER_LDFLAGS: "-lc++ -framework Security -framework SystemConfiguration"
  AnkiIOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: AnkiIOS
